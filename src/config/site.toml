layout = "grid"

[config.home.quote]
text = [
  "Decoding problems",
  "at the intersection of",
  "biology, health, and data.",
]
image = "/images/logo-with-name.png"

[config.home.intro]
title = "here is Aaron"
name = "Aaron"
body = [
  "Scientist, strategist, and occasional developer.",
  "I write about the intersection of biology, healthcare, and AI  -  what's actually changing, what's still broken, and what's worth paying attention to.",
  "This site is a running index of notes, projects, and ideas I find worth thinking through.",
]
image = "/images/logo-cat.png"

[config.home.latest]
