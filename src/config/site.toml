[config.site]
title = "Aaron Limoges"
description = "Decoding problems in biotech."
pageTitle = "Aaron Limoges | Scientist & Healthcare Strategist"
pageDescription = "Notes, projects, and writing at the intersection of biology, healthcare, and AI."
repository = "https://github.com/alimoges42"
footerNote = "Built with Astro."


[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "green-soft"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.comments]
enabled = true
provider = "giscus"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = "alimoges42/alimoges42.github.io"
repo_id = ""
category = "Announcements"
category_id = ""
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "en"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "en"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "Aaron Limoges"
handle = "@alimoges42"
role = "Scientist & Healthcare Strategist"
company = ""
location = "Washington, DC"
email = "aaronlimoges42@gmail.com"
website = "https://aaronlimoges.tech"
github = "https://github.com/alimoges42"
meta = "PhD · Biology & Neuroscience"
avatar = "/images/logo.png"

[[config.topNav.links]]
label = "Home"
href = "/"

[[config.topNav.links]]
label = "Blog"
href = "/blog"

[[config.topNav.links]]
label = "Projects"
href = "/projects"


[[config.topNav.links]]
label = "About"
href = "/about"

